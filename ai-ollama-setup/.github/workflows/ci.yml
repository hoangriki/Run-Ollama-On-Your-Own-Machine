name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Shell script linting
      # -------------------------
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          if ls scripts/*.sh 1> /dev/null 2>&1; then
            shellcheck scripts/*.sh
          else
            echo "No shell scripts found."
          fi

      # -------------------------
      # Python validation
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          if ls examples/python_api/*.py 1> /dev/null 2>&1; then
            python -m py_compile examples/python_api/*.py
          else
            echo "No Python files found."
          fi

      # -------------------------
      # Node validation
      # -------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Node project
        run: |
          if [ -f examples/node_api/package.json ]; then
            cd examples/node_api
            npm install
            npm run lint || echo "No lint script defined."
          else
            echo "No Node project found."
          fi
